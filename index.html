<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Для тебя 💖</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
            }

            body {
                min-height: 100vh;
                background: linear-gradient(135deg, #ffd6e7, #ffeaf3, #fff7fb);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                color: #4a2031;
                overflow: hidden;
            }

            .card {
                width: 100%;
                max-width: 700px;
                background: rgba(255, 255, 255, 0.96);
                border-radius: 28px;
                box-shadow: 0 20px 60px rgba(190, 70, 120, 0.18);
                padding: 34px;
                border: 1px solid rgba(255, 130, 170, 0.25);
                text-align: center;
                position: relative;
                z-index: 2;
            }

            .badge {
                display: inline-block;
                background: #ff76a5;
                color: white;
                padding: 8px 14px;
                border-radius: 999px;
                font-size: 14px;
                margin-bottom: 18px;
            }

            h1 {
                font-size: 36px;
                color: #b03060;
                margin-bottom: 10px;
            }

            .subtitle {
                color: #724858;
                font-size: 16px;
                line-height: 1.5;
                margin-bottom: 26px;
            }

            .message-box {
                background: #fff3f8;
                border: 1px solid #f6c0d2;
                border-radius: 22px;
                padding: 32px 24px;
                min-height: 170px;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                margin-bottom: 22px;
                box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.4);
            }

            .message {
                font-size: 28px;
                line-height: 1.5;
                color: #8a2f53;
                animation: fadeIn 0.5s ease;
            }

            .controls {
                display: flex;
                justify-content: center;
                gap: 12px;
                flex-wrap: wrap;
            }

            button {
                border: none;
                cursor: pointer;
                padding: 14px 24px;
                border-radius: 14px;
                font-size: 15px;
                font-weight: bold;
                transition: 0.2s ease;
            }

            .primary {
                background: linear-gradient(135deg, #ff5f94, #ff8db3);
                color: white;
                box-shadow: 0 12px 24px rgba(255, 95, 148, 0.25);
            }

            .primary:hover {
                transform: translateY(-2px) scale(1.02);
            }

            .secondary {
                background: #fff0f6;
                color: #b03060;
                border: 1px solid #f4bfd0;
            }

            .final-note {
                margin-top: 22px;
                font-size: 18px;
                color: #a33661;
                display: none;
                animation: fadeIn 0.7s ease;
            }

            .heart {
                position: absolute;
                font-size: 22px;
                opacity: 0.18;
                animation: float 8s linear infinite;
                user-select: none;
            }

            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            @keyframes float {
                0% {
                    transform: translateY(110vh) scale(0.8);
                }
                100% {
                    transform: translateY(-20vh) scale(1.2);
                }
            }

            @media (max-width: 700px) {
                .card {
                    padding: 24px 18px;
                }

                h1 {
                    font-size: 30px;
                }

                .message {
                    font-size: 23px;
                }

                .message-box {
                    min-height: 150px;
                    padding: 24px 18px;
                }
            }
        </style>
    </head>
    <body>
        <div class="card">
            <div class="badge">💌 Нажимай дальше</div>
            <h1>Миланочка, у меня для тебя кое-что есть</h1>
            <p class="subtitle">
                Это маленькая страничка с сообщениями. Просто выслушай меня.
                Нажимай кнопку, чтобы открыть всё по порядку.
            </p>

            <div class="message-box">
                <div class="message" id="message">
                    Я не идеальный, плохой и.т.д., возможно ты так считаешь,
                    но..
                </div>
            </div>

            <div class="controls">
                <button class="primary" id="nextBtn">Дальше</button>
                <button class="secondary" id="restartBtn">Начать заново</button>
            </div>

            <div class="final-note" id="finalNote">
                Я тебя очень сильно люблю, и я просто хотел, чтобы ты это знала
                💗
            </div>
        </div>

        <script>
            const messages = [
                "Я не идеальный, плохой и.т.д., возможно ты так считаешь,но.. 💖",
                "Мне безумно нравится твоя улыбка😊",
                "У тебя самые красивые глаза которые я видел, ведь в них я тону как в океане, хоть и умею плавать ✨",
                "Каждое утро, день, вечер и во снах я думаю только о тебе 💭",
                "И хочу сказать нифига я сайт забабахал, ахаха, но на самом деле хочу реально сказать...",
                "Милаш, я тебя безумно сильно люблю! Ты мне очень сильно ценна, дорога и важна, сколько бы я этого не говорил. Давай пожалуйста вернем жизнь в наши отношения.. 💗",
            ];

            const messageEl = document.getElementById("message");
            const nextBtn = document.getElementById("nextBtn");
            const restartBtn = document.getElementById("restartBtn");
            const finalNote = document.getElementById("finalNote");

            let currentIndex = 0;

            function updateMessage() {
                messageEl.style.animation = "none";
                void messageEl.offsetWidth;
                messageEl.style.animation = "fadeIn 0.5s ease";
                messageEl.textContent = messages[currentIndex];

                if (currentIndex === messages.length - 1) {
                    
                    nextBtn.textContent = "Это всё ❤️";
                    finalNote.style.display = "block";
                    nextBtn.innerHTML = `<a href = "https://vk.com/im/convo/243442183?entrypoint=list_all"> Это все❤️ </a>`;
                } else {
                    nextBtn.textContent = "Дальше";
                    finalNote.style.display = "none";
                }
            }

            nextBtn.addEventListener("click", () => {
                if (currentIndex < messages.length - 1) {
                    currentIndex++;
                    updateMessage();
                }
            });

            restartBtn.addEventListener("click", () => {
                currentIndex = 0;
                updateMessage();
            });

            function createHeart() {
                const heart = document.createElement("div");
                heart.className = "heart";
                heart.textContent = Math.random() > 0.5 ? "💖" : "💕";
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.animationDuration = 6 + Math.random() * 5 + "s";
                heart.style.fontSize = 16 + Math.random() * 16 + "px";
                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 11000);
            }

            setInterval(createHeart, 700);
        </script>
    </body>
</html>
